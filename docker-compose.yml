version: "3.8"
services:
  backend:
    build: ./backend
    ports:
      - "8083:8080"
  frontend:
    build: ./frontend
    ports:
      - "8082:80"
  nginx:
    image: nginx
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
